<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>3D Molecule Simulator</title>
  <!-- JSmol 源文件在线目录 -->
  <script type="text/javascript" src="https://chemapps.stolaf.edu/jmol/jsmol/JSmol.min.js"></script>
  <!-- 本地Javascript源文件 -->
  <script src="src/main.js"></script>
  <!-- CSS样式 -->
  <link rel="stylesheet" href="./public/style.css">
</head>

<body>

<div class="container">

  <div class="left">
    <h1>Chemical Structure Generator</h1>

    <p>Enter a chemical formula:</p>

    <label>
      <input type="text" placeholder="Example: H2O">
    </label>
    <button>Generate</button>

    <p style="margin-top:40px;color:#666">
      (Current demo shows a static 3D molecule.)
    </p>
  </div>

  <div class="right" id="viewer"></div>

</div>
<div id="molecule-viewport">
  <p style="padding: 20px;">loading molecules...</p >
</div>

</body>
</html>
