<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>3D Molecule Simulator</title>

  <!-- 本地 JSmol -->
  <script src="src/jsmol.js"></script>

  <!-- 样式表 -->
  <link rel="stylesheet" href="./public/style.css">
</head>

<body>
<div class="container">
  <div class="left">
    <h1>Chemical Structure Generator</h1>

    <!-- 输入类型选择 -->
    <p id="inputType">Input type:</p>

    <div class="input-switch">
      <button id="SMILES">SMILES</button>
      <button id="Random">RandomChem</button>
    </div>


    <p id="inputLabel">Enter SMILES string:</p>
    <label for="moleculeInput"></label><input
      id="moleculeInput"
      type="text"
      placeholder="Enter SMILES e.g. O, O=C=O, CCO"
    />

    <button id="generateBtn">Generate</button>

    <div class="examples">
      <p>Try examples:</p>
      <div id="exampleButtons"></div>
    </div>

    <div class="status">
      <p id="moleculeName">Formula: </p>
      <p id="moleculeSmiles">SMILES: </p>
      <p id="Iterations">Iterations: </p>
    </div>
  </div>

  <div class="right">
    <h2>3D Molecule Viewer</h2>
    <div id="viewer">
      <div class="viewer-background"></div>
      <div id="viewer-canvas"></div>
    </div>
  </div>
</div>

<!-- ✅ 只加载 main.js，不在 HTML 写任何业务逻辑 -->
<script type="module" src="/src/main.js"></script>

<!-- 背景动画 -->
<script src="src/background.js"></script>
</body>
</html>
