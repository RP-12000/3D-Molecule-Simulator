<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>3D Molecule Simulator</title>

  <!-- 本地JSmol -->
  <script src="src/jsmol.js"></script>

  <!-- 样式表 -->
  <link rel="stylesheet" href="./public/style.css">
</head>

<body>
<div class="container">
  <div class="left">
    <h1>Chemical Structure Generator</h1>
    <p>Enter a SMILES string:</p>

    <label for="moleculeInput"></label><input
            id="moleculeInput"
            type="text"
            placeholder="Enter SMILES e.g. O, O=C=O, CCO"
    />

    <button id="generateBtn">Generate</button>

    <div class="examples">
      <p>Try examples:</p>
      <!-- ⚠️ 这里必须是 SMILES，而不是化学式 -->
      <button class="example-btn">O</button>
      <button class="example-btn">O=C=O</button>
      <button class="example-btn">C</button>
      <button class="example-btn">N</button>
    </div>

    <div class="status">
      <p id="moleculeName">No molecule loaded</p>
    </div>
  </div>

  <div class="right">
    <h2>3D Molecule Viewer</h2>
    <div id="viewer">
      <div class="viewer-background"></div>
      <div id="viewer-canvas"></div>
    </div>
  </div>
</div>

<!-- ✅ 主模块：调用后端 /generate -->
<script type="module" src="src/main.js"></script>

<!-- 背景动画 -->
<script src="src/background.js"></script>
</body>
</html>
