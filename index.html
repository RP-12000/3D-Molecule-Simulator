<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Molecule 3D Viewer</title>

  <script type="text/javascript" src="https://chemapps.stolaf.edu/jmol/jsmol/JSmol.min.js"></script>

  <script type="text/javascript">
    var jmolApplet;

    var Info = {
      width: "100%",
      height: "100%",
      use: "HTML5",

      j2sPath: "https://chemapps.stolaf.edu/jmol/jsmol/j2s",

      script: "load https://pubchem.ncbi.nlm.nih.gov/rest/pug/compound/cid/2519/record/SDF/?record_type=3d",

      disableJSCache: true,
      allowJavaScript: true
    };

    window.onload = function() {
      document.getElementById("viewer").innerHTML =
        Jmol.getAppletHtml("jmolApplet", Info);
    };
  </script>

  <style>
      body{
          margin:0;
          font-family:Arial, Helvetica, sans-serif;
      }
      .container{
          display:flex;
          height:100vh;
      }
      .left{
          width:50%;
          padding:40px;
          background:#f5f5f5;
      }
      .right{
          width:50%;
          background:black;
      }
      input{
          width:80%;
          padding:10px;
          font-size:18px;
      }
      button{
          padding:10px 20px;
          font-size:18px;
          margin-left:10px;
      }
  </style>
</head>

<body>

<div class="container">

  <div class="left">
    <h1>Chemical Structure Generator</h1>

    <p>Enter a chemical formula:</p>

    <label>
      <input type="text" placeholder="Example: H2O">
    </label>
    <button>Generate</button>

    <p style="margin-top:40px;color:#666">
      (Current demo shows a static 3D molecule.)
    </p>
  </div>

  <div class="right" id="viewer"></div>

</div>
<div id="molecule-viewport" style="border: 1px solid #ccc; background-color: #f9f9f9;">
  <p style="padding: 20px;">loading molecules...</p >
</div>

</body>
</html>
