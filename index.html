<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>3D Molecule Simulator</title>
  <!-- JSmol 源文件在线目录。这里尝试把它迁移到了本地，如果大家电脑编译没有问题可以考虑删掉在线引用 -->
  <!-- <script src="https://chemapps.stolaf.edu/jmol/jsmol/JSmol.min"></script> -->
  <script src="src/jsmol.js"></script>
  <!-- CSS样式 -->
  <link rel="stylesheet" href="./public/style.css">
</head>

<body>
<div class="container">

  <!-- LEFT PANEL -->
  <div class="left">
    <h1>Chemical Structure Generator</h1>
    <p>Enter a chemical formula:</p>
    <label for="moleculeInput"></label><input id="moleculeInput" type="text" placeholder="Enter SMILES e.g. O or O=C=O" />

    <button id="generateBtn">Generate</button>

    <div class="examples">
      <p>Try examples:</p>
      <button class="example-btn">H2O</button>
      <button class="example-btn">CO2</button>
      <button class="example-btn">CH4</button>
      <button class="example-btn">NH3</button>
    </div>

    <div class="status">
      <p id="moleculeName">No molecule loaded</p>
    </div>
  </div>

  <div class="right">
    <h2>3D Molecule Viewer</h2>
    <div id="viewer">
      <div class="viewer-background"></div>
      <div id="viewer-canvas"></div>
    </div>
  </div>

  <!-- 本地Javascript源文件 -->
  <script type="module" src="src/main.js"></script>
  <!-- 背景动画脚本 -->
  <script src="src/background.js"></script>
</div>
</body>
</html>
