<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>What the Mole</title>
  <!-- 本地 Icon -->
  <link rel="icon" href="/public/favicon.ico">
  <!-- 本地 JSmol -->
  <script src="src/jsmol.js"></script>

  <!-- 样式表 -->
  <link rel="stylesheet" href="./public/style.css">
</head>

<body>
<div class="container">
  <!-- 左侧控制面板 -->
  <div class="left">
    <h1 class="page-title">
      <img src="/public/icon.png" alt="icon" class="title-icon">
      What the Mole
    </h1>

    <!-- 输入类型选择 -->
    <p id="inputType">Input type:</p>
    <div class="input-switch">
      <button id="SMILES">SMILES</button>
      <button id="Random">RandomChem</button>
      <button id="AIConvert" style="background: linear-gradient(135deg, #8b5cf6, #7c3aed);">AI Magic</button>
    </div>

    <!-- 输入框 -->
    <p id="inputLabel">Enter SMILES string:</p>
    <label for="moleculeInput"></label><input
    id="moleculeInput"
    type="text"
    placeholder="Enter SMILES e.g. O, O=C=O, CCO"
  />

    <label for="totalTrials">Total trials:</label>
    <input type="number" id="totalTrials" value="1000000" />

    <button id="generateBtn">Generate</button>

    <!-- 示例按钮 -->
    <div class="examples">
      <p>Try examples:</p>

      <!-- SMILES 示例 -->
      <div id="examples-smiles" class="example-row">
        <button data-type="smiles" data-value="O">O</button>
        <button data-type="smiles" data-value="CCO">CCO</button>
        <button data-type="smiles" data-value="O=C=O">O=C=O</button>
        <button data-type="smiles" data-value="c1ccccc1">c1ccccc1</button>
      </div>

      <!-- 化学式示例 -->
      <div id="examples-formula" class="example-row">
        <button data-type="formula" data-value="H2O">H₂O</button>
        <button data-type="formula" data-value="C2H6O">C₂H₆O</button>
        <button data-type="formula" data-value="CO2">CO₂</button>
        <button data-type="formula" data-value="C6H6">C₆H₆</button>
      </div>
    </div>

    <!-- 状态显示 -->
    <div class="status">
      <p id="moleculeName">Formula: </p>
      <p id="moleculeSmiles">SMILES: </p>
      <p id="Iterations">Iterations: </p>
      <progress id="iterationProgress" value="0" max="100"></progress>
    </div>
  </div>

  <!-- 右侧 3D 渲染面板 -->
  <div class="right">
    <h2>3D Molecule Viewer</h2>
    <div id="viewer">
      <div class="viewer-background"></div>
      <div id="viewer-canvas"></div>
    </div>
  </div>
</div>

<!-- 业务逻辑 -->
<script type="module" src="/src/main.js"></script>

<!-- 背景动画 -->
<script src="src/background.js"></script>
</body>
</html>
