<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>What the Mol</title>

  <!-- Icons -->
  <link rel="icon" href="./public/favicon.ico" />

  <!-- Styles -->
  <link rel="stylesheet" href="./public/style.css" />

  <!-- JSmol (must load before main.js) -->
  <script src="./src/jsmol.js"></script>
</head>
<body>
<div class="container">

  <!-- LEFT PANEL -->
  <aside class="left">
    <h1 class="page-title">
      <img src="./public/icon.png" alt="icon" class="title-icon" />
      What the Mol
    </h1>

    <p id="inputType">Input type:</p>

    <div class="input-switch">
      <button id="SMILES" class="active">SMILES</button>
      <button id="Random">Isomer</button>
      <button id="AIConvert">AI Magic</button>
    </div>

    <p id="inputLabel">Enter SMILES string:</p>

    <div class="input-row">
      <label for="moleculeInput"></label><input id="moleculeInput" type="text" placeholder="Enter SMILES e.g. CCO" />
      <button id="validityBtn" class="help-btn" title="AI stability analysis">?</button>
    </div>
    <div class="analysis-toggle">
      <label for="aiAnalysisToggle">AI analysis</label>
      <input type="checkbox" id="aiAnalysisToggle" />
    </div>

    <div id="validityPanel" class="validity-panel">
      <h3>AI Validity Analysis</h3>
      <div id="validityContent">
        No analysis yet.
      </div>
    </div>

    <button id="generateBtn">Generate</button>

    <!-- EXAMPLES -->
    <div class="examples">
      <p>Try examples:</p>

      <div id="examples-smiles" class="example-row">
        <button data-type="smiles" data-value="O">O</button>
        <button data-type="smiles" data-value="CCO">CCO</button>
        <button data-type="smiles" data-value="O=C=O">O=C=O</button>
        <button data-type="smiles" data-value="c1ccccc1">c1ccccc1</button>
      </div>

      <div id="examples-formula" class="example-row" style="display:none">
        <button data-type="formula" data-value="H2O">H₂O</button>
        <button data-type="formula" data-value="C2H6O">C₂H₆O</button>
        <button data-type="formula" data-value="CO2">CO₂</button>
        <button data-type="formula" data-value="C6H6">C₆H₆</button>
      </div>

      <div id="examples-ai" class="example-row" style="display:none">
        <button data-type="ai" data-value="Water">Water</button>
        <button data-type="ai" data-value="Vinegar">Vinegar</button>
        <button data-type="ai" data-value="Carbon Dioxide">Carbon Dioxide</button>
        <button data-type="ai" data-value="Benzene">Benzene</button>
      </div>
    </div>

    <!-- STATUS -->
    <div class="status">
      <p id="moleculeName">Formula:</p>
      <p id="moleculeSmiles">SMILES:</p>
      <p id="Iterations"></p>
      <progress id="iterationProgress" value="0" max="1"></progress>
    </div>
  </aside>

  <!-- RIGHT PANEL -->
  <main class="right">
    <h2>3D Molecule Viewer</h2>
    <div id="viewer">
      <div class="viewer-background"></div>
      <div id="viewer-canvas"></div>
    </div>
  </main>

</div>

<!-- App Logic -->
<script type="module" src="./src/main.js"></script>

<!-- Background FX -->
<script src="./src/background.js"></script>
</body>
</html>
